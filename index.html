<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <img src="./images/trybewarts-header-logo.svg" alt="Imagem do logo da Trybewarts." class="trybewarts-header-logo">
    
    <h1 id="trybewarts-header-title">Trybewarts</h1>

    <form action="" class="trybewarts-login">
      <input type="email" name="email" placeholder="Email" id="input-email">
      <input type="password" name="password" placeholder="Senha" id="input-password">
      <button id="button-login">Entrar</button>
    </form>
  </header>

  <main>
    <form action="" id="evaluation-form">
      <div id="container-name">
        <input type="text" id="input-name" placeholder="Nome">
        
        <input type="text" id="input-lastname" placeholder="Sobrenome">  
      </div>

      <input type="email" name="email" id="input-email" placeholder="Email">
      
      <select name="house" id="house">
        <option value="Gitnória" id="gitnoria-house">Gitnória</option>
        <option value="Reactpuff" id="reactpuff-house">Reactpuff</option>
        <option value="Corvinode" id="corvinode-house">Corvinode</option>
        <option value="Pytherina" id="pytherina-house" selected>Pytherina</option>
      </select>
    </form>
    <img src="./images/trybewarts-colored.svg" alt="Logo da trybewarts" id="trybewarts-forms-logo">
  </main>
</body>
<script src="./script.js"></script>
</html>
