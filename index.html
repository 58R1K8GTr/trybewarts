<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <img src="./images/trybewarts-header-logo.svg" alt="Imagem do logo da Trybewarts." class="trybewarts-header-logo">
    
    <h1 id="trybewarts-header-title">Trybewarts</h1>

    <form action="" class="trybewarts-login">
      <input type="email" name="email" placeholder="Email" id="input-email-login">
      <input type="password" name="password" placeholder="Senha" id="input-password-login">
      <button id="button-login">Entrar</button>
    </form>
  </header>

  <main>
    <form action="" id="evaluation-form">
      <div id="container-name">
        <input type="text" id="input-name" placeholder="Nome">
        
        <input type="text" id="input-lastname" placeholder="Sobrenome">
      </div>

      <div id="email-house-container">
        <input type="email" name="email-form2" id="input-email" placeholder="Email">
        
        <label for="house">Casa:</label>
        <select name="house" id="house">
          <option value="Gitnória" id="gitnoria-house">Gitnória</option>
          <option value="Reactpuff" id="reactpuff-house">Reactpuff</option>
          <option value="Corvinode" id="corvinode-house">Corvinode</option>
          <option value="Pytherina" id="pytherina-house" selected>Pytherina</option>
        </select>
      </div>

      <div id="containers-side-by-side">
        <div id="container-family">
          <label id="label-family">Qual sua família?</label>
          
          <label for="input-radio-frontend"">Família Frontend
            <input type="radio" name="family" id="input-radio-frontend" value="Frontend">
          </label>
          
          <label for="input-radio-backend"">Família Backend
            <input type="radio" name="family" id="input-radio-backend" value="Backend">
          </label>
          
          <label for="input-radio-fullstack"">Família FullStack
            <input type="radio" name="family" id="input-radio-fullstack" value="FullStack">
          </label>
        </div>

        <div id="container-most-want-to-learn">
          <label id="label-content">Qual conteúdo você está com mais vontade de aprender?
          </label>
          
          <label for="input-comunication">Comunicação
            <input type="checkbox" name="" id="input-comunication" class="subject" value="Comunicação">
          </label>
          
          <label for="input-teamwork">Trabalho em equipe
            <input type="checkbox" name="" id="input-teamwork" class="subject" value="Trabalho em equipe">
          </label>
          
          <label for="input-negotiation">Negociação
            <input type="checkbox" name="" id="input-negotiation" class="subject" value="Negociação">
          </label>
          
          <label for="input-active-listening">Escuta ativa
            <input type="checkbox" name="" id="input-active-listening" class="subject" value="Escuta ativa">
          </label>
          
          <label for="input-array-methods">Métodos de array
            <input type="checkbox" name="" id="input-array-methods" class="subject" value="Métodos de array">
          </label>
          
          <label for="input-jest">Jest
            <input type="checkbox" name="" id="input-jest" class="subject" value="Jest">
          </label>
        </div>
      </div>
      <div id="container-rate">
        <label id="label-rate">Como você avalia a Trybewarts?</label>
      </div>

      <div id="container-describe">
        <label class="textarea">Descreva os principais pontos de aprendizado até aqui (1 hard skill / 1 soft skill):</label>
        <textarea name="textarea-describe" id="textarea-describe" cols="30" rows="10" minlength="20" maxlength="500">
          uma hard skill: javascript em andamento.
          uma soft skill: empatia.
        </textarea>
      </div>
    </form>
    <img src="./images/trybewarts-colored.svg" alt="Logo da trybewarts" id="trybewarts-forms-logo">
  </main>
</body>
<script src="./script.js"></script>
</html>
